<html lang="zh-Hant">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>JS → Node.js 銜接教學</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#f7f6f2; --card:#ffffff; --ink:#1f2421; --muted:#6b6f6a; --line:#e6e3da;
    --accent:#0f6e56; --accent-soft:#e1f5ee; --accent-ink:#0a4f3e;
    --indigo:#534ab7; --indigo-soft:#eeedfe;
    --amber:#854f0b; --amber-soft:#faeeda;
    --code-bg:#1f2430; --code-ink:#e6e7eb;
    --ok:#1d7a4d; --ok-soft:#e7f5ec; --bad:#b3261e; --bad-soft:#fbeaea;
    --radius:14px; --shadow:0 1px 2px rgba(0,0,0,.04);
  }
  @media (prefers-color-scheme: dark){
    :root{ --bg:#16181a; --card:#1f2326; --ink:#e9eae6; --muted:#9aa09a; --line:#31363a;
      --accent:#5dcaa5; --accent-soft:#0f342b; --accent-ink:#9fe1cb;
      --indigo:#afa9ec; --indigo-soft:#26215c; --amber:#ef9f27; --amber-soft:#412402;
      --code-bg:#11141a; --code-ink:#e6e7eb;
      --ok:#5dcaa5; --ok-soft:#103a2b; --bad:#f09595; --bad-soft:#3a1614; }
  }
  *{box-sizing:border-box;}
  body{margin:0; background:var(--bg); color:var(--ink);
    font-family:"Noto Sans TC",system-ui,-apple-system,sans-serif; line-height:1.7;
    -webkit-font-smoothing:antialiased;}
  code{font-family:"JetBrains Mono",ui-monospace,monospace; font-size:.9em;
    background:rgba(125,125,125,.14); padding:1px 5px; border-radius:5px;}
  .wrap{max-width:880px; margin:0 auto; padding:32px 20px 90px;}
  header h1{font-size:25px; font-weight:700; margin:0 0 4px;}
  header p{margin:0; color:var(--muted); font-size:15px;}
  .prog{margin:20px 0 8px; display:flex; align-items:center; gap:12px;}
  .bar{flex:1; height:8px; background:var(--line); border-radius:99px; overflow:hidden;}
  .bar > span{display:block; height:100%; background:var(--accent); width:0; transition:width .35s ease;}
  .prog .count{font-size:13px; color:var(--muted); min-width:90px; text-align:right;}
  nav{display:flex; flex-wrap:wrap; gap:8px; margin:18px 0 24px;}
  .tab{display:flex; align-items:center; gap:8px; padding:9px 14px; border:1px solid var(--line);
    background:var(--card); border-radius:99px; cursor:pointer; font-size:14px; color:var(--ink);
    font-family:inherit; transition:.15s;}
  .tab:hover{border-color:var(--accent);}
  .tab.active{background:var(--accent); color:#fff; border-color:var(--accent);}
  .tab .n{font-weight:700;}
  .tab .dot{width:7px; height:7px; border-radius:50%; background:transparent; border:1.5px solid currentColor; opacity:.5;}
  .tab.done .dot{background:#1d9e75; border-color:#1d9e75; opacity:1;}
  .tab.active.done .dot{background:#fff; border-color:#fff;}
  .panel{background:var(--card); border:1px solid var(--line); border-radius:var(--radius);
    padding:26px 28px; box-shadow:var(--shadow);}
  .badge{display:inline-flex; align-items:center; justify-content:center; width:34px; height:34px;
    border-radius:10px; background:var(--accent-soft); color:var(--accent-ink); font-weight:700; font-size:16px; flex-shrink:0;}
  .ttl-row{display:flex; align-items:center; gap:12px; flex-wrap:wrap;}
  .ttl-row h2{font-size:20px; font-weight:700; margin:0;}
  .maps{margin:14px 0 0; font-size:13.5px; color:var(--muted);}
  .maps code{font-size:.92em;}
  .obs{margin:10px 0 0; font-size:13px; color:var(--muted); background:var(--accent-soft);
    border-radius:8px; padding:8px 12px;}
  .obs b{color:var(--accent-ink);}
  .partlabel{font-size:15px; font-weight:700; color:var(--accent); margin:30px 0 12px;
    padding-top:18px; border-top:2px solid var(--line);}
  .concept{font-size:15.5px; line-height:1.85;}
  .concept b{color:var(--accent); font-weight:500;}
  .blklabel{font-size:13px; color:var(--muted); margin:16px 0 6px;}
  pre{margin:0; background:var(--code-bg); color:var(--code-ink); padding:14px 16px; border-radius:10px;
    overflow-x:auto; line-height:1.6;}
  pre code{background:none; padding:0; color:inherit; font-size:13.5px; white-space:pre;
    font-variant-ligatures:none; font-feature-settings:"liga" 0,"calt" 0;}
  .codenote{font-size:13.5px; color:var(--muted); margin:7px 0 0; padding-left:2px;}
  .key{margin:18px 0 0; padding:13px 16px; background:var(--accent-soft); color:var(--accent-ink);
    border-radius:10px; font-size:15px; font-weight:500;}
  .p2intro{font-size:15.5px; margin:0 0 6px;}
  .nodeitem{margin:16px 0 0;}
  .explain{font-size:14.5px; color:var(--muted); margin:7px 0 0; padding-left:2px;}
  .explain b{color:var(--ink); font-weight:500;}
  .q{border-top:1px solid var(--line); padding-top:16px; margin-top:16px;}
  .q .ask{font-weight:500; margin:0 0 10px; font-size:15.5px;}
  .opt{display:block; width:100%; text-align:left; margin:7px 0; padding:11px 14px; font-size:15px;
    border:1px solid var(--line); border-radius:10px; background:var(--card); color:var(--ink);
    cursor:pointer; font-family:inherit; transition:.12s;}
  .opt:hover:not(:disabled){border-color:var(--accent); background:var(--accent-soft);}
  .opt:disabled{cursor:default;}
  .opt.right{background:var(--ok-soft); border-color:var(--ok); color:var(--ok);}
  .opt.wrong{background:var(--bad-soft); border-color:var(--bad); color:var(--bad);}
  .ans{display:none; margin:8px 0 0; font-size:14px; color:var(--ok); background:var(--ok-soft);
    padding:9px 12px; border-radius:8px;}
  .foot{display:flex; align-items:center; justify-content:space-between; gap:12px; margin-top:30px; flex-wrap:wrap;}
  .nav-btns{display:flex; gap:8px;}
  button.ghost{padding:10px 16px; font-size:14px; border:1px solid var(--line); background:var(--card);
    color:var(--ink); border-radius:10px; cursor:pointer; font-family:inherit;}
  button.ghost:hover:not(:disabled){border-color:var(--accent);}
  button.ghost:disabled{opacity:.4; cursor:default;}
  button.mark{padding:11px 18px; font-size:14px; font-weight:500; border-radius:10px; cursor:pointer;
    font-family:inherit; border:1px solid var(--accent); background:var(--accent); color:#fff;}
  button.mark.is-done{background:var(--ok-soft); color:var(--ok); border-color:var(--ok);}
  .tip{margin-top:26px; font-size:13.5px; color:var(--muted); text-align:center;}
  .reset{background:none; border:none; color:var(--muted); font-size:12.5px; cursor:pointer; text-decoration:underline; font-family:inherit;}
</style>

<body>
<div class="wrap">
  <header>
    <h1>JS → Node.js 銜接教學</h1>
    <p>給新手：先把 JS 觀念弄懂 → 再看它怎麼延伸到 Node.js · 7 課打通地基</p>
  </header>

  <div class="prog">
    <div class="bar"><span id="barFill"></span></div>
    <div class="count" id="count">學完 0 / 7</div>
  </div>

  <nav id="tabs"></nav>

  <div class="tip">進度自動存在這台瀏覽器 · 一課一課來，看得到終點 · <button class="reset" id="reset">清除進度重來</button></div>

<script>
const LESSONS = [
  {
    js:"物件", maps:'<code>req.url</code> · <code>data.title</code> · <code>module.exports</code>',
    concept:
      '先想一個生活情境：你手機裡的一個<b>聯絡人</b>。<br><br>'+
      '一個聯絡人不會只記一筆資料，而是把一整組相關的東西收在一起：<br>'+
      '名字 → 小華　｜　電話 → 0912-345-678　｜　email → hua@mail.com<br><br>'+
      '這種「<b>把相關資料打包成一組</b>」的東西，在 JavaScript 裡就叫<b>物件（object）</b>。<br><br>'+
      '每一列都有兩個部分：<br>'+
      '・左邊（名字、電話）是這格的<b>標籤</b>，叫 <code>key</code>（鍵）<br>'+
      '・右邊（小華、0912…）是<b>內容</b>，叫 <code>value</code>（值）<br><br>'+
      '為什麼要用它？不然你得寫三個散落的變數 <code>name</code>、<code>phone</code>、<code>email</code>；用物件就能把它們收進同一個 <code>member</code> 裡，乾淨又好找。',
    blocks:[
      {label:'怎麼建立一個物件', code:'const member = {\n  name: "小華",\n  age: 25,\n  city: "台北"\n};',
       note:'用大括號 { } 包起來，裡面每組是 key: value，組跟組之間用逗號分開。'},
      {label:'怎麼把裡面的值「讀出來」（兩種寫法，結果一樣）', code:'console.log(member.name);      // 小華   ← 點記法（最常用）\nconsole.log(member["age"]);    // 25     ← 括號記法',
       note:'member.name 你就讀成：「去 member 這張卡，拿 name 這格的值」。'}
    ],
    key:'💡 記這句就好：<code>物件.屬性</code> = 從物件裡拿出某一格的值。',
    p2intro:'你已經會物件了。Node 裡的 <code>req</code>、<code>res</code>、<code>data</code>、<code>module.exports</code> 其實都是物件 —— 觀念沒變，只是「誰建立的、什麼時候用」不同。<b>我們用「開一家飲料店」來想，一次全懂：</b>',
    p2:[
      {code:'http.createServer((req, res) => {\n  console.log(req.url);     // 例如 "/todos"\n  console.log(req.method);  // 例如 "GET"\n});',
       explain:'① <code>req</code>（<b>Node 自動給你的</b>）= 客人遞進來的「<b>點餐單</b>」。<code>req.url</code> = 他點哪一杯（要哪個網址）、<code>req.method</code> = 內用還外帶（GET 還是 POST）。讀法跟 <code>member.name</code> 一模一樣，從物件拿一格。'},
      {code:'res.writeHead(200);          // 設狀態碼\nres.end("Hello");            // 送出內容、結束',
       explain:'② <code>res</code>（<b>Node 自動給你的</b>）= 你「<b>交還給客人的那杯飲料</b>」。它比較特別，是「動手裝好再遞出去」：<code>res.writeHead</code> = 貼標籤（成功 200 / 找不到 404），<code>res.end</code> = 把飲料交出去、結束服務。'},
      {code:'const data = JSON.parse(body);\nconsole.log(data.title);   // 買牛奶',
       explain:'③ <code>data</code>（<b>你自己建的</b>）= 客人遞來一張「<b>密封的訂單</b>」（body，是一串文字），你用 <code>JSON.parse</code> 拆開，拿出裡面寫的東西。名字你自己取（叫 data 是習慣），拆開後就能 <code>data.title</code>。完全不是新觀念。'},
      {code:'module.exports = { sayHello, add };',
       explain:'④ <code>module.exports</code>（Node 特殊變數，<b>這個才真的新</b>）= 一家店「<b>對外的出餐窗口</b>」。你把想給別人用的東西擺上窗口，別的檔案才能 <code>require</code> 來拿；沒擺上去的，外面就拿不到。'}
    ],
    p2mid:'這四個，是靠 <code>createServer</code> 串成一家店的。<b>createServer = 開一家店</b>（做後端、要一直開著等客人上門時用）。傳進去的 <code>(req, res) =&gt; {}</code> = 「<b>接待客人的 SOP</b>」：每來一位客人就照做一次 —— 看他的點餐單（req）、把飲料交還給他（res）。<code>.listen(3000)</code> = 在 3000 號店面開門營業。下面這家小型 Todolist 店，四個東西全在裡面 —— <b>這段現在「看懂每一行在幹嘛」就好，不用會默寫；能自己寫是之後的事，我們會慢慢來。</b>',
    p2after:[
      {code:'// utils.js —— 用 module.exports 公開功能\nfunction makeTodo(title) {\n  return { title: title, done: false };\n}\nmodule.exports = { makeTodo };',
       explain:'這支檔案把 makeTodo 擺上「<b>出餐窗口</b>」（④ module.exports），別的檔案才拿得到。'},
      {code:'// app.js —— 主程式\nconst http = require("http");\nconst { makeTodo } = require("./utils");   // 把 makeTodo 拿進來\n\nconst todos = [];\n\nconst server = http.createServer((req, res) => {\n  if (req.url === "/todos" && req.method === "GET") {\n    res.writeHead(200, { "Content-Type": "application/json" });\n    res.end(JSON.stringify(todos));          // 物件 → 字串，回傳\n  } else if (req.url === "/todos" && req.method === "POST") {\n    let body = "";\n    req.on("data", (chunk) => { body += chunk; });   // 一段段收\n    req.on("end", () => {\n      const data = JSON.parse(body);         // 字串 → 物件\n      todos.push(makeTodo(data.title));\n      res.writeHead(200, { "Content-Type": "application/json" });\n      res.end(JSON.stringify(todos));\n    });\n  } else {\n    res.writeHead(404);\n    res.end("找不到這個網址");\n  }\n});\n\nserver.listen(3000);',
       explain:'整家店全在這：① 看客人的點餐單 <code>req</code>（url/method/on）② 把飲料交還 <code>res</code>（writeHead/end）③ 拆開密封訂單 <code>data</code>（JSON.parse）④ 從窗口拿 makeTodo（require 進來用）。<b>這就是整個 Todolist 影片在做的事。</b>'}
    ],
    p2end:'🔑 <code>req</code>/<code>res</code> 是 Node 自動給你的物件（看需求、回應）；<code>data</code> 是你自己建的物件；<code>module.exports</code> 是把功能拆到別檔案公開；<code>createServer</code> 把它們組成一台伺服器。會物件，這些就都讀得懂了。',
    practice:[
      {ask:'有 <code>const todo = { title: "寫作業", done: false };</code>，我要拿出 <code>"寫作業"</code>，要怎麼寫？',
       opts:[['<code>todo.title</code>',true],['<code>todo["寫作業"]</code>',false],['<code>title.todo</code>',false]],
       ans:'對。todo.title = 從 todo 拿 title 那格。'},
      {ask:'<code>req.method</code> 和 <code>data.title</code>，哪個是「Node 自動給的物件」？',
       opts:[['<code>req</code> 是 Node 給的；<code>data</code> 是你自己建的',true],['兩個都是 Node 給的',false],['兩個都是你自己建的',false]],
       ans:'對。req/res 由 Node 自動產生交給你；data 是你 parse 後自己命名的。'},
      {ask:'<code>createServer((req, res) => {})</code> 裡的函式，什麼時候執行？',
       opts:[['每次有人連到伺服器時跑一次',true],['程式開始只跑一次',false]],
       ans:'對。它是 callback（接客 SOP），每來一個請求就跑一次。'}
    ]
  },
  {
    js:"解構賦值", maps:'<code>const { x } = require(...)</code>',
    concept:
      '你會覺得「在背」，是因為現在記的是<b>規則</b>。換個方式：記一個<b>畫面</b>，就不用背了。<br><br>'+
      '想像出門旅行帶一個<b>行李箱</b>（這就是「物件」）：裡面有襪子、牙刷、充電線各一格。<br><br>'+
      '到飯店要用牙刷，<b>笨方法</b>是每次都開箱：<code>行李箱.牙刷</code>… 等下充電再 <code>行李箱.充電線</code>… 每次都開，很煩。<br><br>'+
      '<b>解構賦值 = 一進房間就「開箱一次」</b>，把要用的東西拿出來擺到桌上、各自有位置，之後直接拿，不用再開箱。',
    blocks:[
      {label:'笨方法 vs 解構（開箱一次）', code:'const box = { socks: "襪子", brush: "牙刷" };\n\n// 笨方法：每次都開箱\nconsole.log(box.socks);\nconsole.log(box.brush);\n\n// 解構：開箱一次，拿出來各自獨立\nconst { socks, brush } = box;\nconsole.log(socks);   // 之後直接用，不用再 box.',
       note:'大括號裡的名字，要跟箱子裡那一格一樣 —— 因為你在「指定拿哪一格」。寫 { shoes } 會拿到 undefined，因為箱子裡沒有 shoes。所以不是規定要背，是「想拿哪格就寫哪格」。'},
      {label:'其實它只是「裝箱」的反向', code:'// 第 1 課：把東西「裝進」物件\nconst member = { name: "小華", age: 25 };\n\n// 這一課：把東西從物件「拿出來」\nconst { name, age } = member;',
       note:'一個是裝箱、一個是拆箱，同一件事的正反兩面。你已經會裝箱了，拆箱只是反過來。'}
    ],
    key:'💡 看到 <code>const { X } = Y</code>，照這句讀：「<b>從 Y 裡面，把那格叫 X 的，拿出來變成獨立的 X</b>」。記這句讀法，比背規則好用。',
    p2intro:'先搞懂 <code>require</code> 本身：<b>require = 進貨</b>，把別的檔案或套件「拿進來用」。它跟 <code>module.exports</code>（出餐窗口）剛好是一對 —— 一邊擺出來、一邊拿進去：',
    p2:[
      {code:'// utils.js —— 把功能擺上「出餐窗口」\nmodule.exports = { makeTodo };\n\n// app.js —— 用 require「進貨」拿回來\nconst utils = require("./utils");\nutils.makeTodo("買牛奶");   // 用 .makeTodo 拿出功能',
       explain:'require 進貨回來的，就是 utils 擺在窗口的那個物件 <code>{ makeTodo }</code>。所以能 <code>utils.makeTodo</code> 用它（物件.屬性，第 1 課學的）。'},
      {code:'require("./utils")   // 有 ./ → 你自己寫的檔案（同資料夾的 utils.js）\nrequire("uuid")      // 沒 ./ → npm 裝的套件\nrequire("http")      // 沒 ./ → Node 內建模組',
       explain:'<b>有沒有 <code>./</code>，決定 Node 去哪找：</b>有 <code>./</code> = 找你自己的檔案；沒有 <code>./</code> = 找內建模組或 npm 套件。這點最常搞混，記住就好。'},
      {code:'// member 是物件 → 解構拿出「資料」\nconst member = { name: "小華" };\nconst { name } = member;            // name 是 "小華"，直接用\n\n// require("./utils") 拿回的也是物件 → 同一招\nconst { makeTodo } = require("./utils");\nmakeTodo("買牛奶");                  // 但這格裝「函式」，要按下去用',
       explain:'<b>這兩組是同一招</b>，都是「從物件拿幾格出來」—— 你會上面 member 那行，就等於會下面這行（因為 require 拿回的就是個物件）。<b>唯一差別：</b>member 的格子裝<b>資料</b>（name 拿出來直接用）；utils 的格子裝<b>函式</b>（makeTodo 拿出來要「呼叫、按下去」，像 <code>makeTodo("買牛奶")</code>）。讀法不變：「從這個物件，把 makeTodo 拿出來」。'},
      {code:'const { v4: uuidv4 } = require("uuid");',
       explain:'冒號 = 開箱時「<b>貼張新標籤</b>」：拿出 v4，改叫 uuidv4，之後寫 <code>uuidv4()</code>。'},

      {code:'const todos = [];   // 空清單，用 [] 建立（後端、前端都一樣）\n\n// 來一筆，就放一張「卡」（物件）進清單\ntodos.push({ title: "買牛奶", id: uuidv4() });\ntodos.push({ title: "寫作業", id: uuidv4() });\n\n// todos 現在是「一疊卡」：\n// [\n//   { title: "買牛奶", id: "..." },\n//   { title: "寫作業", id: "..." }\n// ]',
       explain:'⚠️ 注意：<code>todos</code> 用 <code>[]</code> 建立 —— <b>後端陣列照樣用 []，沒有「後端不用 []」這回事</b>。<code>push</code> 進去的 <code>{ ... }</code> 是<b>物件</b>（一筆 todo），不是陣列。<b>[] 是清單、{} 是一張卡，陣列裡裝物件 = 一疊卡。</b>'},
      {code:'const vips = members.filter((m) => m.level === "VIP");\nconst names = members.map((m) => m.name);',
       explain:'直播第一堂整理會員就用到：<code>filter</code> 篩出 VIP、<code>map</code> 取出每個人的名字。'}
    ],
    p2end:'🔑 資料進後端，幾乎都是「裝進陣列 → 用 filter/map 整理 → 回傳」。',
    practice:[
      {ask:'<code>const a = [10, 20, 30];</code>，<code>a[0]</code> 是？',
       opts:[['<code>10</code>（從 0 開始數）',true],['<code>20</code>',false]],
       ans:'對。陣列從 0 開始數，所以 a[0] 是第一個 10。'},
      {ask:'<code>[1, 2, 3, 4].filter((n) => n > 2)</code> 得到？',
       opts:[['<code>[3, 4]</code>',true],['<code>[1, 2]</code>',false],['<code>true</code>',false]],
       ans:'對。filter 留下「條件成立」的，n > 2 只有 3 和 4。'}
    ]
  },
  {
    js:"非同步 Promise / async / await", maps:'讀檔 · 打 API · 之後幾乎全部',
    concept:
      '這是後端真正的<b>地基</b>。先記一個比喻：<br><br>'+
      '一家餐廳只有<b>一個老闆</b>（Node 是單線程）。客人點了一道要等的菜（讀檔、打 API、查資料庫），老闆<b>不會站在廚房前乾等</b> —— 他先去接別桌的客人，菜好了再回來上。<br><br>'+
      '「<b>先去做別的、好了再回來</b>」就是<b>非同步</b>。<br>'+
      '反過來，如果老闆站著等到菜好才動 = 全店客人都卡住 = 災難，這叫「阻塞」。',
    blocks:[
      {label:'async / await 的寫法', code:'async function main() {\n  const text = await fs.readFile("data.json", "utf-8");\n  console.log(text);\n}',
       note:'await = 「等這件事好」，但等的時候不卡住別人；await 只能寫在 async 函式裡。'},
      {label:'印出順序（最重要的感覺）', code:'console.log("1");\nmain();          // 裡面遇到 await，先讓出去\nconsole.log("3");\n\n// 印出順序：1 → 3 →（main 的 await 好了才回來跑）',
       note:'順序會「跳」，正是因為遇到 await 先去做後面的事了。'}
    ],
    key:'💡 看到 <code>async / await</code>，就是在處理「要等一下」的事，而且它不會卡住整支程式。',
    deepLabel:'網路請求 / fetch / axios（非同步最常見的用途）',
    deep:[
      {label:'① 什麼是網路請求？為什麼一定非同步', code:'// 網頁跟伺服器「要資料 / 送資料」= 網路請求\n// 像叫外送：發出請求後不站在門口乾等，\n// 繼續做別的，資料回來再處理 → 這就是非同步\n\nconst res = await axios.get("https://api.xxx.com/todos");\n//          ↑ await：因為要「等伺服器回來」',
       note:'前端要顯示即時資料（貼文、天氣、商品）都靠網路請求去跟後端要。因為要等網路，所以一定用 async/await，不然網頁會卡死。'},
      {label:'② 兩種發請求的工具：fetch（內建）vs axios（套件）', code:'// fetch（瀏覽器內建，不用裝）\nconst res  = await fetch(url);\nconst data = await res.json();   // 要自己寫 res.json() 轉成物件\n\n// axios（npm install axios，更好用）\nconst res = await axios.get(url);\nconsole.log(res.data);           // res.data 已經是物件，免轉',
       note:'axios.get(url) 拿資料、axios.post(url, data) 送資料；回來的資料在 res.data。fetch 是「自己煮」，axios 是「叫外送平台」——都吃得到飯，axios 幫你處理掉雜事。'},
      {label:'③ ⭐ 何時要自己寫 parse？看「用什麼工具」', code:'// 後端自己接 body / 讀檔 → 字串 → 要寫 JSON.parse\nconst data = JSON.parse(body);\n\n// fetch → 寫 res.json()（它幫你 parse）\nconst data = await res.json();\n\n// axios → 不用寫，res.data 已是物件\nres.data',
       note:'重點是「用哪個工具」不是「有沒有 res」——fetch 也有 res，但還是要寫 res.json()。伺服器永遠送 JSON 字串，差別只在誰幫你轉。對已是物件的東西（axios res.data）再 parse 會報錯。'}
    ],
    deepKey:'💡 網路請求 = 跟伺服器要 / 送資料，因為要等所以用 <code>await</code>。轉成物件：後端接 body 要 <code>JSON.parse</code>、fetch 寫 <code>res.json()</code>、axios 直接 <code>res.data</code>。',
    p2intro:'直播第一堂的讀檔、之後的 Express、資料庫、登入驗證，全是非同步：',
    p2:[
      {code:'const fs = require("fs/promises");\n\nconst text = await fs.readFile("members.json", "utf-8");\nconst members = JSON.parse(text);',
       explain:'讀檔要等硬碟，所以用 <code>await</code>。讀完是字串，再用第 5 課的 <code>JSON.parse</code> 變物件 —— 你看，觀念全串起來了。'}
    ],
    p2end:'🔑 這關通了，你就有資格往 Express、資料庫前進 —— 因為它們全都是非同步。',
    practice:[
      {ask:'<code>await</code> 只能寫在哪裡？',
       opts:[['<code>async</code> 函式裡面',true],['任何地方都行',false]],
       ans:'對。沒有 async 包著，await 會直接語法錯誤。'},
      {ask:'為什麼後端要用非同步？',
       opts:[['不讓「等待」卡住整台伺服器、害其他人排隊',true],['因為比較快打字',false]],
       ans:'對。單線程不能卡，等待的事要讓出去，先服務別人。'},
      {ask:'用 <code>axios.get(url)</code> 拿資料，要不要自己寫 <code>JSON.parse</code>？',
       opts:[['不用，axios 已轉好，直接用 <code>res.data</code>',true],['要，每次都要先 parse',false]],
       ans:'對。axios 自動把 JSON 轉成物件了；fetch 才要寫 res.json()、後端自己接 body 才要 JSON.parse。'}
    ]
  }
];

const OBS = [
  'JS：08-物件教學、17-物件進階教學（速查表03-陣列與物件）　｜　Node：04-Todolist-RESTful-API-kata（req/res/data 的應用）',
  'JS：08-物件教學（速查表03-陣列與物件）　｜　Node：02-Node模組與內建模組（require 解構）',
  'JS：19-函式function（速查表04-函式與作用域）　｜　Node：02、04（createServer 的 callback）',
  'JS：12-比較與邏輯運算子、13-流程判斷-if-else if-else（速查表02-邏輯判斷與if）',
  'JS：05-字串型別、18-陣列與物件整合運用 › 03-JSON格式介紹',
  'JS：07-陣列教學、16-陣列進階教學（速查表05-陣列方法與套路、觀念複習30-陣列5招總表）',
  'JS：22-AJAX網路請求、23-AJAX-axios套件教學（速查表06-AJAX與非同步、打卡任務Day24）　｜　Node：01-Node.js基礎/直播第1堂'
];

const TASKS = [
  {
    day:"Day 1", title:"模組化概念、fs/promises",
    uses:'用到 → <b>第 2 課</b> module / require ｜ <b>第 7 課</b> async / await + fs',
    intro:'把功能拆到 <code>fileManager.js</code>，再用 <code>app.js</code> 引入：先寫檔、寫成功後讀檔印出內容。',
    reqs:[
      '<code>fileManager.js</code>：引入 <code>"fs/promises"</code>，寫 <code>saveData(fileName, content)</code> 和 <code>loadData(fileName)</code>，用 <code>module.exports</code> 匯出兩個函式。',
      '<code>app.js</code>：用 <code>require("./fileManager.js")</code> 引入，先寫入 <code>user.txt</code> 內容 <code>"Hello Node.js!"</code>，寫成功後讀取並印出。'
    ],
    hints:[
      'fs/promises 每個操作前要 await，且 await 只能寫在 async 函式裡。',
      'fs.writeFile 覆蓋寫入；fs.readFile 要加 "utf-8"。',
      '「先寫成功才讀」靠 await 一行一行照順序等。'
    ],
    solution:[
      {label:'fileManager.js', code:'const fs = require("fs/promises");\n\nasync function saveData(fileName, content) {\n  try {\n    await fs.writeFile(fileName, content);\n    console.log("寫入成功：" + fileName);\n  } catch (err) {\n    console.log("寫入失敗：", err);\n  }\n}\n\nasync function loadData(fileName) {\n  try {\n    const data = await fs.readFile(fileName, "utf-8");\n    return data;\n  } catch (err) {\n    console.log("讀取失敗：", err);\n  }\n}\n\nmodule.exports = { saveData, loadData };'},
      {label:'app.js', code:'const { saveData, loadData } = require("./fileManager.js");\n\nasync function main() {\n  await saveData("user.txt", "Hello Node.js!");   // ① 先寫入（await 等它寫完）\n  const content = await loadData("user.txt");      // ② 寫完才讀\n  console.log("檔案內容：", content);              // ③ Hello Node.js!\n}\n\nmain();'}
    ]
  }
];

const KEY = "hex-js2node-v1";
let state = load();
let active = state.active ?? 0;

function load(){ try{ return JSON.parse(localStorage.getItem(KEY)) || {done:{}}; }catch(e){ return {done:{}}; } }
function save(){ localStorage.setItem(KEY, JSON.stringify(state)); }
function esc(s){ return s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;"); }

const tabsEl = document.getElementById("tabs");
const panelEl = document.getElementById("panel");

function renderTabs(){
  tabsEl.innerHTML = "";
  LESSONS.forEach((s,i)=>{
    const b = document.createElement("button");
    b.className = "tab" + (i===active?" active":"") + (state.done[i]?" done":"");
    b.innerHTML = '<span class="dot"></span><span class="n">'+(i+1)+'</span><span>'+s.js+'</span>';
    b.onclick = ()=>{ active=i; state.active=i; save(); render(); };
    tabsEl.appendChild(b);
  });
  const tb = document.createElement("button");
  tb.className = "tab" + (active==='tasks'?" active":"");
  tb.innerHTML = '<span>🏅 每日任務</span>';
  tb.onclick = ()=>{ active='tasks'; state.active='tasks'; save(); render(); };
  tabsEl.appendChild(tb);
}

function codeBlock(b){
  let h = '<div class="blklabel">'+b.label+'</div><pre><code>'+esc(b.code)+'</code></pre>';
  if(b.note) h += '<p class="codenote">'+b.note+'</p>';
  return h;
}

function renderTasks(){
  const td = state.taskDone || (state.taskDone = {});
  let h = '<div class="ttl-row"><span class="badge">🏅</span><h2>每日任務（打卡）</h2></div>';
  h += '<p class="maps">六角的每日任務，邊做邊用前面學的觀念。先自己試，卡住再看解答。</p>';
  TASKS.forEach((t, ti)=>{
    h += '<div class="partlabel">'+t.day+' — '+t.title+'</div>';
    h += '<p class="obs">'+t.uses+'</p>';
    h += '<p class="p2intro">'+t.intro+'</p>';
    h += '<div class="blklabel">題目要求</div><ul style="margin:0;padding-left:20px">'+t.reqs.map(r=>'<li style="margin:8px 0;font-size:15px;line-height:1.6">'+r+'</li>').join('')+'</ul>';
    h += '<div class="blklabel" style="margin-top:16px">提示</div><ul style="margin:0;padding-left:20px">'+t.hints.map(r=>'<li style="margin:6px 0;font-size:14px;color:var(--muted)">'+r+'</li>').join('')+'</ul>';
    h += '<div style="margin:16px 0"><button class="ghost" data-sol="'+ti+'">看參考解答</button></div>';
    h += '<div id="sol-'+ti+'" style="display:none">'+t.solution.map(codeBlock).join('')+'</div>';
    const done = !!td[ti];
    h += '<div class="foot"><button class="mark '+(done?'is-done':'')+'" data-task="'+ti+'">'+(done?'✓ 已打卡（點可取消）':'我做完了（打卡）')+'</button></div>';
  });
  panelEl.innerHTML = h;
  panelEl.querySelectorAll('[data-sol]').forEach(btn=>{
    btn.onclick = ()=>{ const d=document.getElementById('sol-'+btn.dataset.sol); const show=d.style.display==='none'; d.style.display=show?'block':'none'; btn.textContent=show?'收起解答':'看參考解答'; };
  });
  panelEl.querySelectorAll('[data-task]').forEach(btn=>{
    btn.onclick = ()=>{ td[btn.dataset.task]=!td[btn.dataset.task]; save(); render(); };
  });
}

function renderPanel(){
  if(active === 'tasks'){ renderTasks(); return; }
  const s = LESSONS[active];
  let h = '<div class="ttl-row"><span class="badge">'+(active+1)+'</span><h2>第 '+(active+1)+' 課：'+s.js+'</h2></div>';
  h += '<p class="maps">'+(s.mapsText || ('這個觀念之後在 Node 變成 → '+s.maps))+'</p>';
  if(OBS[active]){ h += '<p class="obs"><b>📁 對應 Obsidian 單元</b> — '+OBS[active]+'</p>'; }

  h += '<div class="partlabel">'+(s.part1label || 'PART 1 ── 先把 JS 觀念弄懂')+'</div>';
  h += '<div class="concept">'+s.concept+'</div>';
  s.blocks.forEach(b=>{ h += codeBlock(b); });
  h += '<div class="key">'+s.key+'</div>';

  if(s.deep){
    h += '<div class="partlabel">'+(s.deepLabel || '再深入一點')+'</div>';
    s.deep.forEach(b=>{ h += codeBlock(b); });
    if(s.deepKey){ h += '<div class="key">'+s.deepKey+'</div>'; }
  }

  h += '<div class="partlabel">'+(s.part2label || 'PART 2 ── 延伸到 Node.js（原來如此）')+'</div>';
  h += '<p class="p2intro">'+s.p2intro+'</p>';
  s.p2.forEach(it=>{
    h += '<div class="nodeitem"><pre><code>'+esc(it.code)+'</code></pre><p class="explain">'+it.explain+'</p></div>';
  });
  if(s.p2mid){ h += '<p class="p2intro" style="margin-top:18px;">'+s.p2mid+'</p>'; }
  if(s.p2after){ s.p2after.forEach(it=>{
    h += '<div class="nodeitem"><pre><code>'+esc(it.code)+'</code></pre><p class="explain">'+it.explain+'</p></div>';
  }); }
  h += '<div class="key">'+s.p2end+'</div>';

  h += '<div class="partlabel">換你試試（點選看答案）</div>';
  s.practice.forEach((q,qi)=>{
    h += '<div class="q"><p class="ask">'+(qi+1)+'. '+q.ask+'</p>';
    q.opts.forEach(o=>{ h += '<button class="opt" data-correct="'+o[1]+'">'+o[0]+'</button>'; });
    h += '<p class="ans">'+q.ans+'</p></div>';
  });

  const done = !!state.done[active];
  h += '<div class="foot"><button class="mark '+(done?'is-done':'')+'" id="markBtn">'+(done?'✓ 這課學完了（點可取消）':'我學完這課了')+'</button>'
     + '<div class="nav-btns"><button class="ghost" id="prev" '+(active===0?'disabled':'')+'>← 上一課</button>'
     + '<button class="ghost" id="next" '+(active===LESSONS.length-1?'disabled':'')+'>下一課 →</button></div></div>';
  panelEl.innerHTML = h;

  panelEl.querySelectorAll(".q").forEach(q=>{
    const opts = q.querySelectorAll(".opt");
    opts.forEach(btn=>{
      btn.onclick = ()=>{
        opts.forEach(b=>{ b.disabled=true;
          if(b.dataset.correct==="true") b.classList.add("right");
          else if(b===btn) b.classList.add("wrong");
        });
        q.querySelector(".ans").style.display="block";
      };
    });
  });
  document.getElementById("markBtn").onclick = ()=>{ state.done[active]=!state.done[active]; save(); render(); };
  const prev=document.getElementById("prev"), next=document.getElementById("next");
  if(prev) prev.onclick=()=>{ active=Math.max(0,active-1); state.active=active; save(); render(); };
  if(next) next.onclick=()=>{ active=Math.min(LESSONS.length-1,active+1); state.active=active; save(); render(); };
}

function renderProgress(){
  const n = Object.values(state.done).filter(Boolean).length;
  document.getElementById("barFill").style.width = (n/LESSONS.length*100)+"%";
  document.getElementById("count").textContent = "學完 "+n+" / "+LESSONS.length;
}

function render(){ renderTabs(); renderPanel(); renderProgress(); window.scrollTo({top:0,behavior:"smooth"}); }

document.getElementById("reset").onclick = ()=>{ if(confirm("確定清除所有學習進度？")){ state={done:{}}; active=0; save(); render(); } };

render();
</script>
