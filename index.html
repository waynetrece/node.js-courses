<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>JS → Node.js 銜接教學</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#f6f4ee; --card:#fffdf8; --ink:#222824; --muted:#68706a; --line:#e4dfd2;
    --accent:#176b57; --accent-soft:#e2f3ec; --accent-ink:#0d4d3e;
    --indigo:#4f57a6; --indigo-soft:#eef0fb;
    --amber:#8a5a12; --amber-soft:#fbefd8;
    --code-bg:#20242d; --code-ink:#f0f1eb;
    --ok:#24734e; --ok-soft:#e4f3ea; --bad:#a83a32; --bad-soft:#f8e8e5;
    --radius:12px; --shadow:0 1px 2px rgba(31,36,33,.06);
  }
  @media (prefers-color-scheme: dark){
    :root{ --bg:#171917; --card:#20231f; --ink:#ecebe5; --muted:#a4aaa2; --line:#34382f;
      --accent:#7bd0ad; --accent-soft:#12372c; --accent-ink:#b9ead7;
      --indigo:#b8c0ff; --indigo-soft:#252947; --amber:#e8aa4a; --amber-soft:#3e2b10;
      --code-bg:#11151b; --code-ink:#f0f1eb;
      --ok:#7bd0ad; --ok-soft:#12372c; --bad:#ee9b95; --bad-soft:#3b1d1a; }
  }
  *{box-sizing:border-box;}
  body{margin:0; background:var(--bg); color:var(--ink);
    font-family:"Noto Sans TC",system-ui,-apple-system,sans-serif; line-height:1.7;
    -webkit-font-smoothing:antialiased;}
  code{font-family:"JetBrains Mono",ui-monospace,monospace; font-size:.9em;
    background:rgba(125,125,125,.14); padding:1px 5px; border-radius:5px;}
  .app{display:flex; min-height:100vh;}
  .sidebar{width:290px; flex-shrink:0; background:var(--card); border-right:1px solid var(--line);
    padding:30px 22px; position:sticky; top:0; height:100vh; overflow-y:auto;}
  .brand h1{font-size:20px; font-weight:700; margin:0 0 2px; letter-spacing:-.01em;}
  .brand p{margin:0; color:var(--muted); font-size:13px;}
  .prog{margin:22px 0 4px; display:flex; align-items:center; gap:10px;}
  .bar{flex:1; height:6px; background:var(--line); border-radius:99px; overflow:hidden;}
  .bar > span{display:block; height:100%; background:var(--accent); width:0; transition:width .4s ease;}
  .prog .count{font-size:12px; color:var(--muted); white-space:nowrap;}
  nav{margin-top:4px;}
  .navgroup{margin-top:22px;}
  .navlabel{font-size:11px; font-weight:700; color:var(--muted); letter-spacing:.12em;
    text-transform:uppercase; margin:0 0 8px; padding-left:6px;}
  .navtabs{display:flex; flex-direction:column; gap:1px;}
  .tab{display:flex; align-items:center; gap:10px; width:100%; text-align:left; padding:9px 12px;
    border:none; border-left:2px solid transparent; background:transparent; border-radius:0 8px 8px 0;
    cursor:pointer; font-size:14px; color:var(--ink); font-family:inherit; transition:.12s; line-height:1.4;}
  .tab:hover{background:var(--bg);}
  .tab.active{background:var(--accent-soft); color:var(--accent-ink); font-weight:500; border-left-color:var(--accent);}
  .tab .n{font-size:12px; color:var(--muted); min-width:14px; text-align:center;}
  .tab.active .n{color:var(--accent-ink);}
  .tab .dot{width:7px; height:7px; border-radius:50%; flex-shrink:0; background:transparent; border:1.5px solid var(--muted); opacity:.45;}
  .tab.done .dot{background:var(--accent); border-color:var(--accent); opacity:1;}
  .content{flex:1; min-width:0; padding:52px 60px 100px;}
  .panel-wrap{max-width:760px; margin:0 auto;}
  .badge{display:inline-flex; align-items:center; justify-content:center; min-width:30px; height:30px; padding:0 10px;
    border-radius:8px; background:var(--accent-soft); color:var(--accent-ink); font-weight:700; font-size:14px; flex-shrink:0;}
  .ttl-row{display:flex; align-items:center; gap:12px; flex-wrap:wrap;}
  .ttl-row h2{font-size:20px; font-weight:700; margin:0;}
  .maps{margin:14px 0 0; font-size:13.5px; color:var(--muted);}
  .maps code{font-size:.92em;}
  .obs{margin:10px 0 0; font-size:13px; color:var(--muted); background:var(--accent-soft);
    border-radius:8px; padding:8px 12px;}
  .obs b{color:var(--accent-ink);}
  .partlabel{font-size:15px; font-weight:700; color:var(--accent); margin:30px 0 12px;
    padding-top:18px; border-top:2px solid var(--line);}
  .concept{font-size:15.5px; line-height:1.85;}
  .concept b{color:var(--accent); font-weight:500;}
  .blklabel{font-size:13px; color:var(--muted); margin:16px 0 6px;}
  pre{margin:0; background:var(--code-bg); color:var(--code-ink); padding:14px 16px; border-radius:10px;
    overflow-x:auto; line-height:1.6;}
  pre code{background:none; padding:0; color:inherit; font-size:13.5px; white-space:pre;
    font-variant-ligatures:none; font-feature-settings:"liga" 0,"calt" 0;}
  .codenote{font-size:13.5px; color:var(--muted); margin:7px 0 0; padding-left:2px;}
  .key{margin:18px 0 0; padding:13px 16px; background:var(--accent-soft); color:var(--accent-ink);
    border-radius:10px; font-size:15px; font-weight:500;}
  .learn-card{margin:18px 0 0; padding:18px; background:var(--card); border:1px solid var(--line);
    border-radius:var(--radius); box-shadow:var(--shadow);}
  .learn-card h3{margin:4px 0 10px; font-size:18px; line-height:1.45;}
  .learn-card p{margin:8px 0; font-size:15px;}
  .card-kicker{font-size:12px; color:var(--muted); font-weight:700; letter-spacing:.04em;}
  .step-card{margin:12px 0 0; padding:12px 14px; border:1px solid var(--line); border-radius:10px;
    background:rgba(125,125,125,.05);}
  .step-card p{margin:6px 0; font-size:14px;}
  .step-card span{color:var(--muted); font-weight:700;}
  .simple-list{margin:8px 0 0; padding-left:20px;}
  .simple-list li{margin:6px 0;}
  .pattern-card pre{margin-top:6px;}
  .p2intro{font-size:15.5px; margin:0 0 6px;}
  .nodeitem{margin:16px 0 0;}
  .explain{font-size:14.5px; color:var(--muted); margin:7px 0 0; padding-left:2px;}
  .explain b{color:var(--ink); font-weight:500;}
  .q{border-top:1px solid var(--line); padding-top:16px; margin-top:16px;}
  .q .ask{font-weight:500; margin:0 0 10px; font-size:15.5px;}
  .opt{display:block; width:100%; text-align:left; margin:7px 0; padding:11px 14px; font-size:15px;
    border:1px solid var(--line); border-radius:10px; background:var(--card); color:var(--ink);
    cursor:pointer; font-family:inherit; transition:.12s;}
  .opt:hover:not(:disabled){border-color:var(--accent); background:var(--accent-soft);}
  .opt:disabled{cursor:default;}
  .opt.right{background:var(--ok-soft); border-color:var(--ok); color:var(--ok);}
  .opt.wrong{background:var(--bad-soft); border-color:var(--bad); color:var(--bad);}
  .ans{display:none; margin:8px 0 0; font-size:14px; color:var(--ok); background:var(--ok-soft);
    padding:9px 12px; border-radius:8px;}
  .foot{display:flex; align-items:center; justify-content:space-between; gap:12px; margin-top:30px; flex-wrap:wrap;}
  .nav-btns{display:flex; gap:8px;}
  button.ghost{padding:10px 16px; font-size:14px; border:1px solid var(--line); background:var(--card);
    color:var(--ink); border-radius:10px; cursor:pointer; font-family:inherit;}
  button.ghost:hover:not(:disabled){border-color:var(--accent);}
  button.ghost:disabled{opacity:.4; cursor:default;}
  button.mark{padding:11px 18px; font-size:14px; font-weight:500; border-radius:10px; cursor:pointer;
    font-family:inherit; border:1px solid var(--accent); background:var(--accent); color:#fff;}
  button.mark.is-done{background:var(--ok-soft); color:var(--ok); border-color:var(--ok);}
  .tip{margin-top:26px; font-size:13.5px; color:var(--muted); text-align:center;}
  .reset{background:none; border:none; color:var(--muted); font-size:12.5px; cursor:pointer; text-decoration:underline; font-family:inherit;}
  .related{margin-top:30px; padding:15px 17px; background:var(--indigo-soft); border-radius:12px;}
  .rel-label{font-size:11px; font-weight:700; color:var(--indigo); letter-spacing:.1em; text-transform:uppercase; margin-bottom:6px;}
  .rel-desc{font-size:14px; color:var(--ink); margin:0 0 10px;}
  .rel-btn{display:block; width:100%; text-align:left; margin:6px 0 0; padding:10px 13px; font-size:14px; font-weight:500;
    border:1px solid var(--indigo); background:var(--card); color:var(--indigo); border-radius:8px; cursor:pointer; font-family:inherit; transition:.12s;}
  .rel-btn:hover{background:var(--indigo-soft);}
  .mobile-nav{position:fixed; left:0; right:0; bottom:0; z-index:30; grid-template-columns:repeat(5,1fr);
    gap:2px; padding:8px 8px calc(8px + env(safe-area-inset-bottom)); background:var(--card);
    border-top:1px solid var(--line); box-shadow:0 -6px 18px rgba(0,0,0,.08);}
  .mobile-nav button{min-height:48px; border:0; border-radius:10px; background:transparent; color:var(--muted);
    font-family:inherit; font-size:12px; font-weight:700;}
  .mobile-nav button.active{background:var(--accent-soft); color:var(--accent-ink);}
  @media (max-width:860px){
    body{font-size:16px;}
    .app{display:block; min-height:100vh;}
    .sidebar{position:sticky; top:0; z-index:20; width:auto; height:auto; border-right:none;
      border-bottom:1px solid var(--line); padding:14px 16px 12px; background:color-mix(in srgb, var(--card) 94%, transparent);
      backdrop-filter:blur(12px);}
    .brand h1{font-size:18px;}
    .brand p{font-size:12px;}
    .prog{margin:12px 0 0;}
    nav{display:none;}
    .content{padding:22px 16px 104px;}
    .panel-wrap{max-width:none;}
    .ttl-row h2{font-size:19px; line-height:1.35;}
    .maps,.obs,.codenote{font-size:14px;}
    .concept,.p2intro,.q .ask{font-size:16px;}
    .learn-card{padding:16px; border-radius:14px;}
    .learn-card h3{font-size:17px;}
    pre{border-radius:12px; padding:14px; max-width:100%; overflow-x:auto; -webkit-overflow-scrolling:touch;}
    pre code{font-size:13px; line-height:1.65;}
    .opt,button.ghost,button.mark{min-height:44px;}
    .foot{align-items:stretch;}
    .nav-btns{width:100%;}
    .nav-btns button{flex:1;}
    .mobile-nav{display:grid;}
  }
  @media (min-width:861px){
    .mobile-nav{display:none;}
  }
</style>
</head>
<body>
<div class="app">
  <aside class="sidebar">
    <div class="brand">
      <h1>JS → Node.js</h1>
      <p>銜接教學 · 給新手</p>
    </div>
    <div class="prog">
      <div class="bar"><span id="barFill"></span></div>
      <div class="count" id="count">學完 0 / 7</div>
    </div>
    <nav id="tabs"></nav>
  </aside>
  <main class="content">
    <div class="panel-wrap">
      <div class="panel" id="panel"></div>
      <div class="tip">進度自動存在這台瀏覽器 · 看得到終點 · <button class="reset" id="reset">清除進度重來</button></div>
    </div>
  </main>
</div>
<nav class="mobile-nav" id="mobileNav" aria-label="主要學習導覽"></nav>

<script>
const LESSONS = [
  {
    js:"物件", maps:'<code>req.url</code> · <code>data.title</code> · <code>module.exports</code>',
    concept:
      '先想一個生活情境：你手機裡的一個<b>聯絡人</b>。<br><br>'+
      '一個聯絡人不會只記一筆資料，而是把一整組相關的東西收在一起：<br>'+
      '名字 → 小華　｜　電話 → 0912-345-678　｜　email → hua@mail.com<br><br>'+
      '這種「<b>把相關資料打包成一組</b>」的東西，在 JavaScript 裡就叫<b>物件（object）</b>。<br><br>'+
      '每一列都有兩個部分：<br>'+
      '・左邊（名字、電話）是這格的<b>標籤</b>，叫 <code>key</code>（鍵）<br>'+
      '・右邊（小華、0912…）是<b>內容</b>，叫 <code>value</code>（值）<br><br>'+
      '為什麼要用它？不然你得寫三個散落的變數 <code>name</code>、<code>phone</code>、<code>email</code>；用物件就能把它們收進同一個 <code>member</code> 裡，乾淨又好找。',
    blocks:[
      {label:'怎麼建立一個物件', code:'const member = {\n  name: "小華",\n  age: 25,\n  city: "台北"\n};',
       note:'用大括號 { } 包起來，裡面每組是 key: value，組跟組之間用逗號分開。'},
      {label:'怎麼把裡面的值「讀出來」（兩種寫法，結果一樣）', code:'console.log(member.name);      // 小華   ← 點記法（最常用）\nconsole.log(member["age"]);    // 25     ← 括號記法',
       note:'member.name 你就讀成：「去 member 這張卡，拿 name 這格的值」。'}
    ],
    key:' 記這句就好：<code>物件.屬性</code> = 從物件裡拿出某一格的值。',
    p2intro:'你已經會物件了。Node 裡的 <code>req</code>、<code>res</code>、<code>data</code>、<code>module.exports</code> 其實都是物件 —— 觀念沒變，只是「誰建立的、什麼時候用」不同。<b>我們用「開一家飲料店」來想，一次全懂：</b>',
    p2:[
      {code:'http.createServer((req, res) => {\n  console.log(req.url);     // 例如 "/todos"\n  console.log(req.method);  // 例如 "GET"\n});',
       explain:'① <code>req</code>（<b>Node 自動給你的</b>）= 客人遞進來的「<b>點餐單</b>」。<code>req.url</code> = 他點哪一杯（要哪個網址）、<code>req.method</code> = 內用還外帶（GET 還是 POST）。讀法跟 <code>member.name</code> 一模一樣，從物件拿一格。'},
      {code:'res.writeHead(200);          // 設狀態碼\nres.end("Hello");            // 送出內容、結束',
       explain:'② <code>res</code>（<b>Node 自動給你的</b>）= 你「<b>交還給客人的那杯飲料</b>」。它比較特別，是「動手裝好再遞出去」：<code>res.writeHead</code> = 貼標籤（成功 200 / 找不到 404），<code>res.end</code> = 把飲料交出去、結束服務。'},
      {code:'const data = JSON.parse(body);\nconsole.log(data.title);   // 買牛奶',
       explain:'③ <code>data</code>（<b>你自己建的</b>）= 客人遞來一張「<b>密封的訂單</b>」（body，是一串文字），你用 <code>JSON.parse</code> 拆開，拿出裡面寫的東西。名字你自己取（叫 data 是習慣），拆開後就能 <code>data.title</code>。完全不是新觀念。'},
      {code:'module.exports = { sayHello, add };',
       explain:'④ <code>module.exports</code>（Node 特殊變數，<b>這個才真的新</b>）= 一家店「<b>對外的出餐窗口</b>」。你把想給別人用的東西擺上窗口，別的檔案才能 <code>require</code> 來拿；沒擺上去的，外面就拿不到。'}
    ],
    p2mid:'這四個，是靠 <code>createServer</code> 串成一家店的。<b>createServer = 開一家店</b>（做後端、要一直開著等客人上門時用）。傳進去的 <code>(req, res) =&gt; {}</code> = 「<b>接待客人的 SOP</b>」：每來一位客人就照做一次 —— 看他的點餐單（req）、把飲料交還給他（res）。<code>.listen(3000)</code> = 在 3000 號店面開門營業。下面這家小型 Todolist 店，四個東西全在裡面 —— <b>這段現在「看懂每一行在幹嘛」就好，不用會默寫；能自己寫是之後的事，我們會慢慢來。</b>',
    p2after:[
      {code:'// utils.js —— 用 module.exports 公開功能\nfunction makeTodo(title) {\n  return { title: title, done: false };\n}\nmodule.exports = { makeTodo };',
       explain:'這支檔案把 makeTodo 擺上「<b>出餐窗口</b>」（④ module.exports），別的檔案才拿得到。'},
      {code:'// app.js —— 主程式\nconst http = require("http");\nconst { makeTodo } = require("./utils");   // 把 makeTodo 拿進來\n\nconst todos = [];\n\nconst server = http.createServer((req, res) => {\n  if (req.url === "/todos" && req.method === "GET") {\n    res.writeHead(200, { "Content-Type": "application/json" });\n    res.end(JSON.stringify(todos));          // 物件 → 字串，回傳\n  } else if (req.url === "/todos" && req.method === "POST") {\n    let body = "";\n    req.on("data", (chunk) => { body += chunk; });   // 一段段收\n    req.on("end", () => {\n      const data = JSON.parse(body);         // 字串 → 物件\n      todos.push(makeTodo(data.title));\n      res.writeHead(200, { "Content-Type": "application/json" });\n      res.end(JSON.stringify(todos));\n    });\n  } else {\n    res.writeHead(404);\n    res.end("找不到這個網址");\n  }\n});\n\nserver.listen(3000);',
       explain:'整家店全在這：① 看客人的點餐單 <code>req</code>（url/method/on）② 把飲料交還 <code>res</code>（writeHead/end）③ 拆開密封訂單 <code>data</code>（JSON.parse）④ 從窗口拿 makeTodo（require 進來用）。<b>這就是整個 Todolist 影片在做的事。</b>'},
      {code:'// 番外：真實 Todolist 伺服器回應前還會多一段 headers\nconst headers = {\n  "Access-Control-Allow-Origin": "*",   // 允許任何網域來要（* = 全部）\n  "Access-Control-Allow-Methods": "GET, POST, DELETE, OPTIONS",\n  "Content-Type": "application/json"\n};\nres.writeHead(200, headers);',
       explain:'<b>CORS（瀏覽器的安全鎖）：</b>瀏覽器預設不准網頁跟「別的網域」要資料（防壞人）。那堆 <code>Access-Control-Allow-*</code> headers = 後端跟瀏覽器說「<b>我允許你</b>」。'},
      {code:'} else if (req.method === "OPTIONS") {\n  res.writeHead(200, headers);\n  res.end();   // 回 200 說「可以送」\n}',
       explain:'<b>OPTIONS（預檢請求）：</b>瀏覽器送 POST/DELETE 前，會先偷偷送一個 <code>OPTIONS</code> 問「我可以送嗎？」→ 後端要回 200 + headers 說「可以」。<b>一句話：CORS 是瀏覽器的安全鎖，headers + OPTIONS 是後端開門讓它進，不是 Node 壞掉。</b>'}
    ],
    p2end:' <code>req</code>/<code>res</code> 是 Node 自動給你的物件（看需求、回應）；<code>data</code> 是你自己建的物件；<code>module.exports</code> 是把功能拆到別檔案公開；<code>createServer</code> 把它們組成一台伺服器。（真實伺服器會多 CORS headers + OPTIONS 預檢 —— 那是瀏覽器的安全規矩。）',
    practice:[
      {ask:'有 <code>const todo = { title: "寫作業", done: false };</code>，我要拿出 <code>"寫作業"</code>，要怎麼寫？',
       opts:[['<code>todo.title</code>',true],['<code>todo["寫作業"]</code>',false],['<code>title.todo</code>',false]],
       ans:'對。todo.title = 從 todo 拿 title 那格。'},
      {ask:'<code>req.method</code> 和 <code>data.title</code>，哪個是「Node 自動給的物件」？',
       opts:[['<code>req</code> 是 Node 給的；<code>data</code> 是你自己建的',true],['兩個都是 Node 給的',false],['兩個都是你自己建的',false]],
       ans:'對。req/res 由 Node 自動產生交給你；data 是你 parse 後自己命名的。'},
      {ask:'<code>createServer((req, res) => {})</code> 裡的函式，什麼時候執行？',
       opts:[['每次有人連到伺服器時跑一次',true],['程式開始只跑一次',false]],
       ans:'對。它是 callback（接客 SOP），每來一個請求就跑一次。'}
    ]
  },
  {
    js:"解構賦值", maps:'<code>const { x } = require(...)</code>',
    concept:
      '你會覺得「在背」，是因為現在記的是<b>規則</b>。換個方式：記一個<b>畫面</b>，就不用背了。<br><br>'+

function makeGroup(labelText){
  const g = document.createElement("div"); g.className = "navgroup";
  const l = document.createElement("div"); l.className = "navlabel"; l.textContent = labelText;
  const t = document.createElement("div"); t.className = "navtabs";
  g.appendChild(l); g.appendChild(t); tabsEl.appendChild(g);
  return t;
}
function makeTab(into, html, isActive, onClick, extraClass){
  const b = document.createElement("button");
  b.className = "tab" + (isActive?" active":"") + (extraClass||"");
  b.innerHTML = html;
  b.onclick = onClick;
  into.appendChild(b);
}

function renderMobileNav(){
  if(!mobileNavEl) return;
  const items = [
    { id:'rescue', label:'救進度' },
    { id:0, label:'課程' },
    { id:'stuck', label:'卡點' },
    { id:'patterns', label:'練習' },
    { id:'progress', label:'進度' }
  ];
  mobileNavEl.innerHTML = items.map(item =>
    '<button class="'+(active===item.id || (item.id===0 && typeof active === 'number') ? 'active' : '')+'" data-view="'+item.id+'">'+item.label+'</button>'
  ).join('');
  mobileNavEl.querySelectorAll('button').forEach(btn => {

      save();

      h += '</div>';
    });
    h += '</div>';
  });
  panelEl.innerHTML = h;
}

function renderStuckPoints() {
  let h = viewTitle('新手卡點庫', '【卡住時用】先找到你卡在哪，再補對觀念；每個卡點給一題立刻能練的小題。');
  STUCK_POINTS.forEach(point => {
    h += '<div class="learn-card">';
    h += '<h3>' + point.symptom + '</h3>';
    h += '<p><b>真正原因：</b>' + point.cause + '</p>';
    h += '<p><b>要補觀念：</b>' + point.concept + '</p>';
    h += '<p><b>立刻練一題：</b>' + point.drill + '</p>';
    h += '<p class="codenote">出現位置：' + point.course + '</p>';
    h += '</div>';
  });
  panelEl.innerHTML = h;
}

function renderPatterns() {
  let h = viewTitle('中文需求 → 寫法生成訓練', '【要寫功能時用】看到需求，拆出資料、條件、流程和該用的語法（不是背影片答案）。');
  PATTERN_DRILLS.forEach(drill => {
    h += '<div class="learn-card pattern-card">';
    h += '<div class="card-kicker">' + drill.problemType + '</div>';
    h += '<h3>' + drill.title + '</h3>';
    h += '<p><b>需求：</b>' + drill.requirement + '</p>';
    h += '<p><b>輸入：</b>' + drill.input + '</p>';
    h += '<p><b>輸出：</b>' + drill.output + '</p>';
    h += '<div class="blklabel">腦中先跑這些步驟</div>';
    h += listItems(drill.steps);
    h += '<div class="blklabel">引導版</div>';
    h += '<pre><code>' + esc(drill.guidedCode) + '</code></pre>';
    h += '<p class="key"><b>變形題：</b>' + drill.variation + '</p>';
    h += '<p class="obs"><b>空格練習</b> — ' + drill.blankPrompt + '</p>';
    h += '</div>';
  });
  panelEl.innerHTML = h;
}

function renderProgressView() {
  const lessonDone = Object.values(state.done || {}).filter(Boolean).length;
  const taskDone = Object.values(state.taskDone || {}).filter(Boolean).length;
  let h = viewTitle('學習進度', '這裡只看最重要的：你補了哪些底層觀念、接下來該做哪一題。');
  h += '<div class="learn-card">';
  h += '<h3>目前狀態</h3>';
  h += '<p>觀念課完成：<b>' + lessonDone + ' / ' + LESSONS.length + '</b></p>';
  h += '<p>每日任務完成：<b>' + taskDone + ' / ' + TASKS.length + '</b></p>';
  h += '<p class="key">下一步建議：如果還無法自己想到 POST 寫法，先做「新增一筆 todo」的寫法生成訓練，再回去看影片 code。</p>';
  h += '</div>';
  panelEl.innerHTML = h;
}

function renderApiCourse(){
  let h = '<div class="ttl-row"><h2>Todolist API：增刪改查（CRUD）</h2></div>';
  h += '<p class="maps">整個 Todolist 系列在教的核心：讓前端對待辦「增刪改查」。用「便利貼牆」想 —— todos 是貼滿便利貼的牆。</p>';
  h += '<p class="obs"><b>路由地圖</b> — GET /todos 查全部 ｜ POST /todos 增一筆 ｜ DELETE /todos 刪全部 ｜ DELETE /todos/:id 刪一筆 ｜ PATCH /todos/:id 改一筆</p>';
  API_STAGES.forEach(s=>{
    h += '<div class="partlabel">'+s.title+'</div>';
    h += '<p class="p2intro">'+s.what+'</p>';
    h += '<pre><code>'+esc(s.code)+'</code></pre>';
    if(s.note){ h += '<p class="codenote">'+s.note+'</p>'; }
  });
  h += '<div class="key"> 帶 id 的操作（刪一筆、改一筆）都是同一套路：<b>從網址切出 id → findIndex 找位置 → 找到就動手、找不到回 404</b>。</div>';
  panelEl.innerHTML = h;
}

function renderThink(){
  let h = '<div class="ttl-row"><h2>觀念複習：問題 → 用什麼</h2></div>';
  h += '<p class="maps">【寫之前用】先問自己：「我這個念頭是哪一種？」→ 對照下面 → 知道該用什麼。這是從「看得懂」走到「自己寫得出」的關鍵。</p>';
  h += '<div class="partlabel">先看「怎麼思考」一次（以 if/else 為例）</div>';
  h += '<div class="key" style="background:var(--amber-soft); color:var(--ink)">① 先問「這裡有幾種情況？」→ 不只一種 → ② 「要分別處理」＝ 需要分岔 → 用 <code>if/else</code> → ③ 「怎麼分辨？」用條件（req.url + req.method）→ ④ 每種情況填進 { } → ⑤ 都不符合 → else。<br><b>結論：看到「要依不同情況做不同事」這個念頭，就是 if/else 的時機。</b></div>';
  h += '<div class="partlabel">念頭 → 工具 對照（8 個核心）</div>';
  THINK.forEach(c=>{
    h += '<div class="nodeitem"><p class="p2intro" style="margin:16px 0 4px"><b> 念頭：</b>'+c.q+'</p>';
    h += '<p class="explain" style="margin:0 0 6px"><b>→ 該用：'+c.tool+'</b></p>';
    h += '<pre><code>'+esc(c.js)+'</code></pre>';
    h += '<p class="codenote">Node 對應：'+c.node+'</p></div>';
  });
  h += '<div class="key"> 寫之前先問：「<b>如果…就 / 分幾種</b>」→ if/else ｜「<b>每一筆 / 全部</b>」→ forEach/map ｜「<b>會重複用</b>」→ 函式 ｜「<b>要等</b>」→ await ｜「<b>包在一起</b>」→ 物件。</div>';
  panelEl.innerHTML = h;
}

function renderTasks(){
  const td = state.taskDone || (state.taskDone = {});
  let h = '<div class="ttl-row"><h2>每日任務（打卡）</h2></div>';
  h += '<p class="maps">六角的每日任務，邊做邊用前面學的觀念。先自己試，卡住再看解答。</p>';
  TASKS.forEach((t, ti)=>{
    h += '<div class="partlabel">'+t.day+' — '+t.title+'</div>';
    h += '<p class="obs">'+t.uses+'</p>';
    if(t.concept){ h += '<div class="concept" style="margin:12px 0">'+t.concept+'</div>'; }
    if(t.demo){ t.demo.forEach(d=>{ h += codeBlock(d); }); }
    h += '<p class="p2intro">'+t.intro+'</p>';
    h += '<div class="blklabel">題目要求</div><ul style="margin:0;padding-left:20px">'+t.reqs.map(r=>'<li style="margin:8px 0;font-size:15px;line-height:1.6">'+r+'</li>').join('')+'</ul>';
    h += '<div class="blklabel" style="margin-top:16px">提示</div><ul style="margin:0;padding-left:20px">'+t.hints.map(r=>'<li style="margin:6px 0;font-size:14px;color:var(--muted)">'+r+'</li>').join('')+'</ul>';
    h += '<div style="margin:16px 0"><button class="ghost" data-sol="'+ti+'">看參考解答</button></div>';
    h += '<div id="sol-'+ti+'" style="display:none">'+t.solution.map(codeBlock).join('')+'</div>';
    const done = !!td[ti];
    h += '<div class="foot"><button class="mark '+(done?'is-done':'')+'" data-task="'+ti+'">'+(done?' 已打卡（點可取消）':'我做完了（打卡）')+'</button></div>';
  });
  panelEl.innerHTML = h;
  panelEl.querySelectorAll('[data-sol]').forEach(btn=>{
    btn.onclick = ()=>{ const d=document.getElementById('sol-'+btn.dataset.sol); const show=d.style.display==='none'; d.style.display=show?'block':'none'; btn.textContent=show?'收起解答':'看參考解答'; };
  });
  panelEl.querySelectorAll('[data-task]').forEach(btn=>{
    btn.onclick = ()=>{ td[btn.dataset.task]=!td[btn.dataset.task]; save(); render(); };
  });
}

function renderPanel(){
  if(active === 'rescue'){ renderRescue(); return; }
  if(active === 'stuck'){ renderStuckPoints(); return; }
  if(active === 'patterns'){ renderPatterns(); return; }
  if(active === 'progress'){ renderProgressView(); return; }
  if(active === 'tasks'){ renderTasks(); return; }
  if(active === 'api'){ renderApiCourse(); return; }
  if(active === 'think'){ renderThink(); return; }
  const s = LESSONS[active];
  let h = '<div class="ttl-row"><span class="badge">'+(active+1)+'</span><h2>第 '+(active+1)+' 課：'+s.js+'</h2></div>';
  h += '<p class="maps">'+(s.mapsText || ('這個觀念之後在 Node 變成 → '+s.maps))+'</p>';
  if(OBS[active]){ h += '<p class="obs"><b> 對應 Obsidian 單元</b> — '+OBS[active]+'</p>'; }

  h += '<div class="partlabel">'+(s.part1label || 'PART 1 ── 先把 JS 觀念弄懂')+'</div>';
  h += '<div class="concept">'+s.concept+'</div>';
  s.blocks.forEach(b=>{ h += codeBlock(b); });
  h += '<div class="key">'+s.key+'</div>';

  if(s.deep){
    h += '<div class="partlabel">'+(s.deepLabel || '再深入一點')+'</div>';
    s.deep.forEach(b=>{ h += codeBlock(b); });
    if(s.deepKey){ h += '<div class="key">'+s.deepKey+'</div>'; }
  }

  h += '<div class="partlabel">'+(s.part2label || 'PART 2 ── 延伸到 Node.js（原來如此）')+'</div>';
  h += '<p class="p2intro">'+s.p2intro+'</p>';
  s.p2.forEach(it=>{
    h += '<div class="nodeitem"><pre><code>'+esc(it.code)+'</code></pre><p class="explain">'+it.explain+'</p></div>';
  });
  if(s.p2mid){ h += '<p class="p2intro" style="margin-top:18px;">'+s.p2mid+'</p>'; }
  if(s.p2after){ s.p2after.forEach(it=>{
    h += '<div class="nodeitem"><pre><code>'+esc(it.code)+'</code></pre><p class="explain">'+it.explain+'</p></div>';
  }); }
  h += '<div class="key">'+s.p2end+'</div>';

  h += '<div class="partlabel">換你試試（點選看答案）</div>';
  s.practice.forEach((q,qi)=>{
    h += '<div class="q"><p class="ask">'+(qi+1)+'. '+q.ask+'</p>';
    q.opts.forEach(o=>{ h += '<button class="opt" data-correct="'+o[1]+'">'+o[0]+'</button>'; });
    h += '<p class="ans">'+q.ans+'</p></div>';
  });

  if(RELATED[active]){
    h += '<div class="related"><div class="rel-label">相關每日任務</div>';
    h += '<p class="rel-desc">看完這課觀念，到「每日任務」實際練一次：</p>';
    RELATED[active].forEach(r=>{ h += '<button class="rel-btn" data-gotask="1">'+r.day+' · '+r.desc+' →</button>'; });
    h += '</div>';
  }

  const done = !!state.done[active];
  h += '<div class="foot"><button class="mark '+(done?'is-done':'')+'" id="markBtn">'+(done?' 這課學完了（點可取消）':'我學完這課了')+'</button>'
     + '<div class="nav-btns"><button class="ghost" id="prev" '+(active===0?'disabled':'')+'>← 上一課</button>'
     + '<button class="ghost" id="next" '+(active===LESSONS.length-1?'disabled':'')+'>下一課 →</button></div></div>';
  panelEl.innerHTML = h;

  panelEl.querySelectorAll('[data-gotask]').forEach(b=>{
    b.onclick = ()=>{ active='tasks'; state.active='tasks'; save(); render(); };
  });

  panelEl.querySelectorAll(".q").forEach(q=>{
    const opts = q.querySelectorAll(".opt");
    opts.forEach(btn=>{
      btn.onclick = ()=>{
        opts.forEach(b=>{ b.disabled=true;
          if(b.dataset.correct==="true") b.classList.add("right");
          else if(b===btn) b.classList.add("wrong");
        });
        q.querySelector(".ans").style.display="block";
      };
    });
  });
  document.getElementById("markBtn").onclick = ()=>{ state.done[active]=!state.done[active]; save(); render(); };
  const prev=document.getElementById("prev"), next=document.getElementById("next");
  if(prev) prev.onclick=()=>{ active=Math.max(0,active-1); state.active=active; save(); render(); };
  if(next) next.onclick=()=>{ active=Math.min(LESSONS.length-1,active+1); state.active=active; save(); render(); };
}

function renderProgress(){
  const n = Object.values(state.done).filter(Boolean).length;
  document.getElementById("barFill").style.width = (n/LESSONS.length*100)+"%";
  document.getElementById("count").textContent = "學完 "+n+" / "+LESSONS.length;
}

function render(){ renderTabs(); renderMobileNav(); renderPanel(); renderProgress(); window.scrollTo({top:0,behavior:"smooth"}); }

document.getElementById("reset").onclick = ()=>{ if(confirm("確定清除所有學習進度？")){ state={done:{}, uiVersion:3, active:0}; active=0; save(); render(); } };

render();
</script>
</body>
</html>
